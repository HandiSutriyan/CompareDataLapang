<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Hasil Kalibrasi Sementara</title>
    <style>
        @page {
            size: A4;
            margin: 20mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
        }

        h1, h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 6px;
            text-align: center;
        }

        img {
            width: 100%;
            margin-bottom: 20px;
        }

        .page-break {
            page-break-before: always;
        }
    </style>
</head>
<body>
    <h1>Laporan Hasil Kalibrasi Sementara </h1>
    <hr>
    <h2>Ringkasan {{ subtitle }}</h2>
    <p> <i>{{ info }}</i> </p>
    {{ summary_table }}

    <h2>Grafik Perbandingan</h2>
    <hr>
    {% for plot in plots %}
        <img src="{{ plot }}" width="600">
    {% endfor %}
</body>
</html>
